{% extends "base.html" %}

{% block content %}
<div class="wrapper-content">
    <div class="wrapper-content__body">
        <div id="block_error">
            <div class="block-bg"></div>
            <div class="container">
                <div class="error-page">
                    <div class="row justify-content-center">
                        <div class="col-lg-8">
                            <div class="component_card">
                                <div class="card text-center p-5">
                                    <!-- Error Icon -->
                                    <div class="error-icon mb-4">
                                        <svg width="120" height="120" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                            <circle cx="12" cy="12" r="10" stroke="#ffc107" stroke-width="1.5"/>
                                            <path d="M12 8V12" stroke="#ffc107" stroke-width="1.5" stroke-linecap="round"/>
                                            <circle cx="12" cy="16" r="0.5" fill="#ffc107" stroke="#ffc107" stroke-width="1.5"/>
                                        </svg>
                                    </div>
                                    
                                    <h1 class="error-title" style="font-size: 96px; color: #ffc107; margin-bottom: 0;">404</h1>
                                    <h2 class="error-subtitle" style="font-size: 32px; margin-bottom: 20px;">Page Not Found</h2>
                                    
                                    <div class="error-message mb-4">
                                        <p class="lead" style="font-size: 18px;">
                                            The page you're looking for doesn't exist or has been moved.
                                        </p>
                                    </div>
                                    
                                    <div class="search-box mb-4">
                                        <form action="/search/" method="get" class="d-flex justify-content-center">
                                            <input type="text" 
                                                   name="q" 
                                                   class="form-control" 
                                                   style="width: 300px; margin-right: 10px;" 
                                                   placeholder="Search our site...">
                                            <button type="submit" class="btn btn-primary">Search</button>
                                        </form>
                                    </div>
                                    
                                    <div class="error-actions">
                                        <a href="/" class="btn btn-primary btn-lg">Go to Homepage</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
